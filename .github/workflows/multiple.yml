name: Multiple Jobs Workflow

on:
  push:
    branches: [ main ]

jobs:

  job1:
    runs-on: ubuntu-latest
    steps:
    - name: Step in Job 1
      run: echo "Job 1 executed"

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
    - name: Step in Job 2
      run: echo "Job 2 executed after Job 1"

  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
    - name: Step in Job 3
      run: echo "Job 3 executed after Job 2"
